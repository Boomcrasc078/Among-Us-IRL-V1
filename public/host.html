<!doctype html>
<html data-bs-theme="dark">
	<head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Among Us IRL</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
		/>
		<link rel="stylesheet" href="CSS/fonts.css" />
		<link rel="stylesheet" href="CSS/background.css" />
	</head>
	<body>
		<div class="background-image"></div>
		<main>
			<div id="loading" style="display: none">
				<div id="connectingContainer" class="container">
					<div
						class="d-flex flex-wrap gap-5 justify-content-center align-items-center position-absolute top-50 start-50 translate-middle"
					>
						<h1 id="loading-text" class="display-1 text-center">Vänta...</h1>
						<div
							class="spinner-border"
							style="width: 5rem; height: 5rem; border-width: 0.5rem"
							role="status"
						>
							<span class="visually-hidden">Laddar...</span>
						</div>
					</div>
				</div>
			</div>
			<div id="lobby" style="display: none">
				<div class="container">
					<div class="d-flex flex-column">
						<div class="text-center flex-column gap-5">
							<div>
								<h2 class="mt-5">Välkommen till</h2>
								<h1 class="">AMONG US IRL</h1>
							</div>
							<div>
								<h3 class="">Anslut på</h3>
								<h1 class=>tinyurl.se/amongusirl</h1>
								<h3 class="">och ange koden:</h3>
								<h1 id="lobbyCode"></h1>
							</div>
						</div>
						<div class="mt-5">
							<div class="d-flex gap-5 align-items-center">
								<h3 class="amatic">Väntar på spelare</h3>
								<div class="spinner-border" style="border-width: 0.3rem" role="status">
									<span class="visually-hidden">Loading...</span>
								</div>
							</div>
							<table id="playersTable" class="table">
								<thead>
									<tr>
										<th class="bg-body-glass" scope="col">#</th>
										<th class="bg-body-glass" scope="col">Namn</th>
									</tr>
								</thead>
								<tbody id="playersTableBody"></tbody>
							</table>
						</div>
						<div class="mt-5 d-flex flex-column">
							<button class="btn btn-primary btn-lg rounded rounded-pill" id="startGameBtn">
								STARTA SPELET
							</button>
						</div>
					</div>
				</div>
			</div>
			<div id="error" style="display: none">
				<div id="errorContainer" class="container">
					<div class="d-flex flex-column gap-5 position-absolute top-50 start-50 translate-middle">
						<h1 id="error-text" class="display-1 text-center">Ett fel uppstod</h1>
						<button class="btn btn-primary btn-lg rounded rounded-pill" onclick="location.reload()">
							Försök igen
						</button>
					</div>
				</div>
			</div>
		</main>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
		<script src="/socket.io/socket.io.js"></script>
		<script src="Components/theme.js"></script>
		<script src="Components/loadingScreen.js"></script>
		<script src="Components/error.js"></script>
		<script src="Host/host.js"></script>
	</body>
</html>
