<!doctype html>
<html data-bs-theme="dark">
	<head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Among Us IRL</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
		/>
	</head>
	<body>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
		<script src="/socket.io/socket.io.js"></script>
		<script src="theme.js"></script>
		<main>
			<div class="container mt-5">
				<h1 class="display-2">Välkommen till</h1>
				<h1 class="display-1">AMONG US IRL</h1>
				<div>
					<h1>Anslut på tinyurl.com/amongusirl</h1>
					<h1>och ange koden: <span id="lobbyCode"> </span></h1>
				</div>
				<div class="mt-5">
					<div class="d-flex gap-5 align-items-center">
						<h2>Väntar på spelare</h2>
						<div class="spinner-border" role="status">
							<span class="visually-hidden">Loading...</span>
						</div>
					</div>
					<table id="playersTable" class="table">
						<thead>
							<tr>
								<th scope="col">#</th>
								<th scope="col">Namn</th>
							</tr>
						</thead>
						<tbody id="playersTableBody"></tbody>
					</table>
				</div>
				<div class="mt-5 d-flex flex-column">
					<button
						class="btn btn-primary btn-lg rounded rounded-pill"
						id="startGameBtn"
					>
						STARTA SPELET
					</button>
				</div>
			</div>
		</main>
	</body>
</html>

<script>
	const tableElement = document.getElementById("playersTableBody");
	setInterval(updateTable, 1000);
	function updateTable() {
		let table = "";
		let i = 0;
		for (let player in localLobby.players) {
			table += `<tr>
			<td scope="col">${i}</td>
			<td scope="col">${player.name}</td>
			</tr>`;
		}
		tableElement.innerHTML = table;
	}
</script>

<script src="host.js"></script>
